services:
  postgres:
    image: postgres:16-alpine
    container_name: diploma-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-diploma_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-12345}
      POSTGRES_DB: ${DB_NAME:-dev}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-diploma_user} -d ${DB_NAME:-dev}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      target: dev
    container_name: diploma-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: ${PORT:-3001}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-diploma_user}
      DB_PASSWORD: ${DB_PASSWORD:-12345}
      DB_NAME: ${DB_NAME:-dev}
    ports:
      - "${PORT:-3001}:3001"
    volumes:
      - ./src:/app/src
      - ./config:/app/config
      - ./uploads:/app/uploads
      - ./tsconfig.json:/app/tsconfig.json
      - ./tsconfig.build.json:/app/tsconfig.build.json
      - ./nest-cli.json:/app/nest-cli.json
      - ./package.json:/app/package.json
      - ./package-lock.json:/app/package-lock.json

volumes:
  postgres_data:
